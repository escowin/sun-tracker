<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#440f0f" />
    <meta
      name="description"
      content="PWA that tracks Sun activity with math & fetched NASA API data"
    />
    <!-- <link rel="manifest" href="./dist/manifest.json" /> -->
    <link rel="stylesheet" type="text/css" href="./src/css/styles.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap");
    </style>
    <script defer src="./dist/app.bundle.js"></script>
    <!-- <script defer>
      (function () {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker
            .register("./service-worker.js")
            .then(() => console.log("registered service worker"))
            .catch((error) =>
              console.log("service worker registration failed")
            );
        }
      })();
    </script> -->
    <title>Sun tracker</title>
  </head>
  <body>
    <!-- 
      Header: Sun, Time
      Main: Weather, Recent Activity, Profile
      Footer: Distance, Copyright
        -->
    <header class="bg" id="sun-section">
      <h1 class="subheader">&#8857;</h1>

      <section id="sun-graphic" aria-label="Stylized sun element"></section>

      <section id="temp-txt">
        <p class="label" id="current-date"></p>
        <p class="label" id="temp-now" data-type="temp"></p>
        <p class="subheader">Sunny</p>
        <p class="label">H <span id="temp-high" data-type="temp"></span></p>
        <p class="label">L <span id="temp-low" data-type="temp"></span></p>
      </section>

      <section id="units">
        <fieldset class="label" id="units-controller">
          <legend>units</legend>
          <label for="kelvin">
            K
            <input type="radio" id="kelvin" name="temp-unit" value="si" />
          </label>

          <label for="celsius">
            C&deg;
            <input type="radio" id="celsius" name="temp-unit" value="metric" />
          </label>

          <label for="fahrenheit">
            F&deg;
            <input
              type="radio"
              id="fahrenheit"
              name="temp-unit"
              value="imperial"
            />
          </label>
        </fieldset>
      </section>
    </header>

    <main class="bg">
      <h2 class="subheader">Forecast</h2>
      <section class="grid" id="forecast">
        <ul class="list grid" id="forecast-container"></ul>
      </section>

      <h2 class="subheader">Recent Activity</h2>
      <section id="activity">
        <nav class="flex" id="api-selection">
          <button class="subheader" id="cme-btn" data-target="#cme-list">
            Coronal mass ejections
          </button>
          <button class="subheader" id="flr-btn" data-target="#flr-list">
            Solar flares
          </button>
        </nav>

        <ul class="list" id="cme-list"></ul>
        <ul class="list" id="flr-list"></ul>
      </section>

      <h2 class="subheader">Profile</h2>
      <section class="grid" id="sun-stats">
        <p id="label">spectral</p>
        <p id="spectral"></p>

        <p class="label">luminosity</p>
        <p id="luminosity"></p>
        <p class="label">metallicity</p>
        <p id="metallicity"></p>
        <p class="label">distance</p>
        <p>
          <span id="distance" data-type="dist"></span><br />
          <span id="lm"></span>
        </p>
      </section>
    </main>

    <footer class="bg">
      <a
        href="https://github.com/escowin/sun-tracker/"
        target="_blank"
        class="link"
      >
        sun-tracker &copy; <span id="copyright-year"></span> Edwin m. escobar</a
      >
    </footer>
  </body>
</html>
