<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#440f0f" />
    <meta
      name="description"
      content="PWA that tracks Sun activity with math & fetched NASA API data"
    />
    <!-- <link rel="manifest" href="./dist/manifest.json" /> -->
    <link rel="preload" href="./src/css/retro.css" as="style" />
    <link rel="stylesheet" type="text/css" href="./src/css/retro.css" />
    <link rel="preload" href="./dist/app.bundle.js" as="script" />
    <script defer src="./dist/app.bundle.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () =>
          navigator.serviceWorker
            .register("./service-worker.js")
            .catch((err) => console.log("service worker registration failed", err))
        );
      }
    </script>
    <title>Sun tracker</title>
  </head>
  <body>
    <!-- 
      Header: Sun, Time
      Main: Weather, Recent Activity, Profile
      Footer: Distance, Copyright
        -->
    <header class="bg" id="sun-section">
      <h1 class="subheader site-heading" aria-label="The Sun">&#8857;</h1>

      <section id="sun-graphic" aria-label="Stylized sun element"></section>

      <section id="temp-txt">
        <article>
          <p class="label" id="current-date"></p>
          <p class="label" id="temp-now" data-type="temp"></p>
          <p>Sunny</p>
        </article>
        <article id="high-low">
          <p class="label">H <span id="temp-high" data-type="temp"></span></p>
          <p class="label">L <span id="temp-low" data-type="temp"></span></p>
        </article>
      </section>

      <section id="units">
        <fieldset class="label dash-glow" id="units-controller">
          <legend>units</legend>
          <label for="kelvin">
            K
            <input type="radio" id="kelvin" name="temp-unit" value="si" />
          </label>

          <label for="celsius">
            C&deg;
            <input type="radio" id="celsius" name="temp-unit" value="metric" />
          </label>

          <label for="fahrenheit">
            F&deg;
            <input
              type="radio"
              id="fahrenheit"
              name="temp-unit"
              value="imperial"
            />
          </label>
        </fieldset>
      </section>
    </header>

    <main class="bg">
      <section id="profile-section">
        <h2 class="subheader">Profile</h2>
        <dl class="grid" id="sun-stats">
          <dt class="label">distance</dt>
          <dd>
            <span id="lm"></span>
            <span id="distance" data-type="dist"></span>
          </dd>
          
          <dt class="label">spectral</dt>
          <dd id="spectral"></dd>

          <dt class="label">luminosity</dt>
          <dd id="luminosity"></dd>

          <dt class="label">metallicity</dt>
          <dd id="metallicity"></dd>
        </dl>
      </section>

      <section id="forecast-section">
        <h2 class="subheader">Forecast</h2>
        <ul class="list grid" id="forecast-container"></ul>
      </section>

      <section id="activity-section">
        <h2 class="subheader">Recent Activity</h2>
          <nav class="flex" id="api-selection">
            <button class="api-btn" id="cme-btn" data-type="cme">
              Coronal Mass Ejections
            </button>
            <button class="api-btn" id="flr-btn" data-type="flr">
              Solar Flares
            </button>
          </nav>

        <article id="activity-lists">
          <ul class="list" id="activity-list" aria-label="Activity list"></ul>
        </article>
      </section>
    </main>

    <footer class="bg">
      <a
        href="https://github.com/escowin/sun-tracker/"
        target="_blank"
        class="link"
      >
        sun-tracker &copy; <span id="copyright-year"></span> Edwin m. escobar</a
      >
    </footer>
  </body>
</html>
